<!DOCTYPE html>
<html>
<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<script>
AFRAME.registerComponent('bond', {
  schema: {
    start: {type: 'vec3', default: {x:0, y:0, z:0}},
    end:   {type: 'vec3', default: {x:0, y:1, z:0}},
    radius:{type: 'number', default: 0.06},
    color: {type: 'color', default: '#ccddee'}
  },
  init: function() {
    var d = this.data;
    var A = new THREE.Vector3(d.start.x, d.start.y, d.start.z);
    var B = new THREE.Vector3(d.end.x,   d.end.y,   d.end.z);
    var len = A.distanceTo(B);
    var mid = new THREE.Vector3().addVectors(A, B).multiplyScalar(0.5);
    var dir = new THREE.Vector3().subVectors(B, A).normalize();
    var geo = new THREE.CylinderGeometry(d.radius, d.radius, len, 16);
    var mat = new THREE.MeshStandardMaterial({color: d.color, roughness:0.3, metalness:0.1});
    var mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(mid);
    mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir);
    this.el.object3D.add(mesh);
  }
});
</script>

<body style="margin: 0px; overflow: hidden;">
<a-scene embedded arjs renderer="colorManagement: true; physicallyCorrectLights: true;">

  <a-light type="ambient" color="#ffffff" intensity="0.5"></a-light>
  <a-light type="directional" color="#ffffff" intensity="1.2" position="1 2 1"></a-light>
  <a-light type="point" color="#aaddff" intensity="0.5" position="-1 1 0"></a-light>

  <!-- HIRO → H2O
       Sphères grandes (CPK) : O rayon 0.32, H rayon 0.22
       Les cylindres s'enfoncent bien dans les sphères
  -->
  <a-marker preset="hiro">

    <!-- Liaisons EN PREMIER (dessinées sous les sphères) -->
    <a-entity bond="start:0 0.6 0; end:-0.514 0.202 0; radius:0.06; color:#bbccdd"></a-entity>
    <a-entity bond="start:0 0.6 0; end:0.514 0.202 0; radius:0.06; color:#bbccdd"></a-entity>

    <!-- Sphères PAR DESSUS (cachent les bouts des cylindres) -->
    <a-sphere position="0 0.6 0" radius="0.32"
      material="color:#ff2200; roughness:0.15; metalness:0.05; shader:standard;">
    </a-sphere>
    <a-sphere position="-0.514 0.202 0" radius="0.22"
      material="color:#eeeeee; roughness:0.1; metalness:0.05; shader:standard;">
    </a-sphere>
    <a-sphere position="0.514 0.202 0" radius="0.22"
      material="color:#eeeeee; roughness:0.1; metalness:0.05; shader:standard;">
    </a-sphere>

    <a-text value="H2O — Eau" position="0 1.2 0" align="center" color="#00d4ff" scale="0.7 0.7 0.7"></a-text>
    <a-text value="Angle H-O-H : 104.5 deg" position="0 1.0 0" align="center" color="#ffffff" scale="0.45 0.45 0.45"></a-text>
  </a-marker>

  <!-- KANJI → NH3
       N rayon 0.30, H rayon 0.22
  -->
  <a-marker preset="kanji">

    <!-- Liaisons EN PREMIER -->
    <a-entity bond="start:0 0.55 0; end:0.557 0.327 0; radius:0.06; color:#bbccdd"></a-entity>
    <a-entity bond="start:0 0.55 0; end:-0.278 0.327 0.482; radius:0.06; color:#bbccdd"></a-entity>
    <a-entity bond="start:0 0.55 0; end:-0.278 0.327 -0.482; radius:0.06; color:#bbccdd"></a-entity>

    <!-- Sphères PAR DESSUS -->
    <a-sphere position="0 0.55 0" radius="0.30"
      material="color:#2255ff; roughness:0.15; metalness:0.05; shader:standard;">
    </a-sphere>
    <a-sphere position="0.557 0.327 0" radius="0.22"
      material="color:#eeeeee; roughness:0.1; metalness:0.05; shader:standard;">
    </a-sphere>
    <a-sphere position="-0.278 0.327 0.482" radius="0.22"
      material="color:#eeeeee; roughness:0.1; metalness:0.05; shader:standard;">
    </a-sphere>
    <a-sphere position="-0.278 0.327 -0.482" radius="0.22"
      material="color:#eeeeee; roughness:0.1; metalness:0.05; shader:standard;">
    </a-sphere>

    <a-text value="NH3 — Ammoniac" position="0 1.2 0" align="center" color="#00d4ff" scale="0.7 0.7 0.7"></a-text>
    <a-text value="Angle H-N-H : 107 deg" position="0 1.0 0" align="center" color="#ffffff" scale="0.45 0.45 0.45"></a-text>
  </a-marker>

  <a-entity camera></a-entity>
</a-scene>
</body>
</html>
