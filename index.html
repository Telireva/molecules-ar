<!DOCTYPE html>
<html>
<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
<body style="margin: 0px; overflow: hidden;">
<a-scene embedded arjs>
  <!-- HIRO → H2O -->
  <a-marker preset="hiro">
    <!-- Oxygène rouge -->
    <a-sphere position="0 0.5 0" radius="0.35" color="#ff3333"></a-sphere>
    <!-- H gauche blanc -->
    <a-sphere position="-0.52 0.2 0" radius="0.18" color="#ffffff"></a-sphere>
    <!-- H droit blanc -->
    <a-sphere position="0.52 0.2 0" radius="0.18" color="#ffffff"></a-sphere>
    <!-- Liaisons -->
    <a-cylinder position="-0.26 0.35 0" radius="0.04" height="0.45" color="#aabbcc" rotation="0 0 55"></a-cylinder>
    <a-cylinder position="0.26 0.35 0" radius="0.04" height="0.45" color="#aabbcc" rotation="0 0 -55"></a-cylinder>
    <!-- Étiquette -->
    <a-text value="H2O - Eau - 104.5 deg" position="0 1.1 0" align="center" color="#00d4ff" scale="0.7 0.7 0.7"></a-text>
  </a-marker>
  <!-- KANJI → NH3 -->
  <a-marker preset="kanji">
    <!-- Azote bleu -->
    <a-sphere position="0 0.5 0" radius="0.32" color="#3366ff"></a-sphere>
    <!-- H1 -->
    <a-sphere position="0 0.1 0.55" radius="0.18" color="#ffffff"></a-sphere>
    <!-- H2 -->
    <a-sphere position="-0.48 0.1 -0.27" radius="0.18" color="#ffffff"></a-sphere>
    <!-- H3 -->
    <a-sphere position="0.48 0.1 -0.27" radius="0.18" color="#ffffff"></a-sphere>
    <!-- Liaisons -->
    <a-cylinder position="0 0.3 0.275" radius="0.04" height="0.5" color="#aabbcc" rotation="72 0 0"></a-cylinder>
    <a-cylinder position="-0.24 0.3 -0.135" radius="0.04" height="0.5" color="#aabbcc" rotation="72 120 0"></a-cylinder>
    <a-cylinder position="0.24 0.3 -0.135" radius="0.04" height="0.5" color="#aabbcc" rotation="72 240 0"></a-cylinder>
    <!-- Étiquette -->
    <a-text value="NH3 - Ammoniac - 107 deg" position="0 1.1 0" align="center" color="#00d4ff" scale="0.7 0.7 0.7"></a-text>
  </a-marker>
  <a-entity camera></a-entity>
</a-scene>
</body>
</html>
