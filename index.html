<!DOCTYPE html>
<html>
<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
<body style="margin: 0px; overflow: hidden;">

<a-scene embedded arjs renderer="colorManagement: true; physicallyCorrectLights: true;">

  <!-- Éclairage réaliste -->
  <a-light type="ambient" color="#ffffff" intensity="0.5"></a-light>
  <a-light type="directional" color="#ffffff" intensity="1.2" position="1 2 1"></a-light>
  <a-light type="point" color="#aaddff" intensity="0.5" position="-1 1 0"></a-light>

  <!-- ═══════════════════════════════
       HIRO → H2O
       O = (0, 0.6, 0)
       H gauche = (-0.514, 0.202, 0)
       H droit  = ( 0.514, 0.202, 0)
       Angle H-O-H = 104.5°
  ═══════════════════════════════ -->
  <a-marker preset="hiro">

    <!-- Oxygène rouge -->
    <a-sphere position="0 0.6 0" radius="0.38"
      material="color:#ff2200; roughness:0.15; metalness:0.05; shader:standard;">
    </a-sphere>

    <!-- H gauche -->
    <a-sphere position="-0.514 0.202 0" radius="0.22"
      material="color:#eeeeee; roughness:0.1; metalness:0.05; shader:standard;">
    </a-sphere>

    <!-- H droit -->
    <a-sphere position="0.514 0.202 0" radius="0.22"
      material="color:#eeeeee; roughness:0.1; metalness:0.05; shader:standard;">
    </a-sphere>

    <!-- Liaison O-H gauche
         milieu = (-0.257, 0.401, 0)
         vecteur O->H = (-0.514, -0.398, 0)
         angle avec Y = 52.25° → rotation Z = +52.25
    -->
    <a-cylinder position="-0.257 0.401 0"
      radius="0.05" height="0.65"
      material="color:#ccddee; roughness:0.25; shader:standard;"
      rotation="0 0 52.25">
    </a-cylinder>

    <!-- Liaison O-H droite
         milieu = (0.257, 0.401, 0)
         angle avec Y = 52.25° → rotation Z = -52.25
    -->
    <a-cylinder position="0.257 0.401 0"
      radius="0.05" height="0.65"
      material="color:#ccddee; roughness:0.25; shader:standard;"
      rotation="0 0 -52.25">
    </a-cylinder>

    <a-text value="H2O — Eau" position="0 1.25 0" align="center"
      color="#00d4ff" scale="0.75 0.75 0.75"></a-text>
    <a-text value="Angle H-O-H : 104.5 deg" position="0 1.0 0" align="center"
      color="#ffffff" scale="0.5 0.5 0.5"></a-text>

  </a-marker>

  <!-- ═══════════════════════════════
       KANJI → NH3
       N  = (0,     0.55,  0)
       H1 = (0.557, 0.327, 0)
       H2 = (-0.278, 0.327, 0.482)
       H3 = (-0.278, 0.327,-0.482)
       theta = 68.158° (angle N-H / vertical)
       Angle H-N-H = 107°
  ═══════════════════════════════ -->
  <a-marker preset="kanji">

    <!-- Azote bleu -->
    <a-sphere position="0 0.55 0" radius="0.35"
      material="color:#2255ff; roughness:0.15; metalness:0.05; shader:standard;">
    </a-sphere>

    <!-- H1 -->
    <a-sphere position="0.557 0.327 0" radius="0.22"
      material="color:#eeeeee; roughness:0.1; metalness:0.05; shader:standard;">
    </a-sphere>

    <!-- H2 -->
    <a-sphere position="-0.278 0.327 0.482" radius="0.22"
      material="color:#eeeeee; roughness:0.1; metalness:0.05; shader:standard;">
    </a-sphere>

    <!-- H3 -->
    <a-sphere position="-0.278 0.327 -0.482" radius="0.22"
      material="color:#eeeeee; roughness:0.1; metalness:0.05; shader:standard;">
    </a-sphere>

    <!-- Liaison N-H1
         milieu=(0.278, 0.438, 0)
         rotation: angle_tilt=111.8° autour Z, puis 90° autour Y
    -->
    <a-cylinder position="0.278 0.438 0"
      radius="0.05" height="0.6"
      material="color:#ccddee; roughness:0.25; shader:standard;"
      rotation="0 90 111.8">
    </a-cylinder>

    <!-- Liaison N-H2
         milieu=(-0.139, 0.438, 0.241)
         rotation: angle_tilt=111.8°, azimut=-30°
    -->
    <a-cylinder position="-0.139 0.438 0.241"
      radius="0.05" height="0.6"
      material="color:#ccddee; roughness:0.25; shader:standard;"
      rotation="0 -30 111.8">
    </a-cylinder>

    <!-- Liaison N-H3
         milieu=(-0.139, 0.438,-0.241)
         rotation: angle_tilt=111.8°, azimut=-150°
    -->
    <a-cylinder position="-0.139 0.438 -0.241"
      radius="0.05" height="0.6"
      material="color:#ccddee; roughness:0.25; shader:standard;"
      rotation="0 -150 111.8">
    </a-cylinder>

    <a-text value="NH3 — Ammoniac" position="0 1.2 0" align="center"
      color="#00d4ff" scale="0.75 0.75 0.75"></a-text>
    <a-text value="Angle H-N-H : 107 deg" position="0 0.95 0" align="center"
      color="#ffffff" scale="0.5 0.5 0.5"></a-text>

  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

</body>
</html>
