<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Molécules AR — Seconde</title>

  <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.0/dist/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ar.js@2.2.2/aframe/build/aframe-ar.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }

    /* Bandeau haut */
    #ui-top {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 999;
      background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, transparent 100%);
      padding: 14px 20px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .app-title {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .app-title span {
      color: #00d4ff;
    }

    /* Badges molécules */
    #mol-badges {
      display: flex;
      gap: 8px;
    }

    .badge {
      background: rgba(255,255,255,0.12);
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      backdrop-filter: blur(8px);
    }

    .badge .marker-label {
      font-size: 10px;
      color: rgba(255,255,255,0.55);
      display: block;
      line-height: 1;
      margin-bottom: 2px;
    }

    /* Bandeau bas - instructions */
    #ui-bottom {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 999;
      background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, transparent 100%);
      padding: 30px 20px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .instruction {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      text-align: center;
      line-height: 1.5;
    }

    .instruction strong {
      color: #00d4ff;
    }

    /* Info popup quand molécule détectée */
    #mol-info {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      background: rgba(10, 14, 26, 0.92);
      border: 1.5px solid #00d4ff;
      border-radius: 14px;
      padding: 14px 20px;
      min-width: 240px;
      text-align: center;
      backdrop-filter: blur(12px);
      display: none;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    #mol-info .mol-formula {
      font-size: 22px;
      font-weight: 800;
      color: #00d4ff;
      margin-bottom: 4px;
    }

    #mol-info .mol-name {
      font-size: 14px;
      color: #fff;
      margin-bottom: 8px;
    }

    #mol-info .mol-data {
      font-size: 12px;
      color: rgba(255,255,255,0.65);
      line-height: 1.7;
    }

    /* Loader */
    #loader {
      position: fixed;
      inset: 0;
      background: #0a0e1a;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      transition: opacity 0.5s;
    }

    #loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-title {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }

    .loader-title span { color: #00d4ff; }

    .loader-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      text-align: center;
      max-width: 280px;
      line-height: 1.6;
    }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(0,212,255,0.2);
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Autorisation caméra */
    #cam-prompt {
      position: fixed;
      inset: 0;
      background: #0a0e1a;
      z-index: 8888;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 40px;
      text-align: center;
    }

    #cam-prompt.show { display: flex; }

    .cam-icon { font-size: 52px; }

    .cam-title {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    .cam-sub {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      line-height: 1.7;
      max-width: 300px;
    }
  </style>
</head>
<body>

<!-- Loader initial -->
<div id="loader">
  <div class="spinner"></div>
  <div class="loader-title">Molécules <span>AR</span></div>
  <div class="loader-sub">Chargement de la caméra et des bibliothèques AR…<br>Autorise l'accès à ta caméra quand le navigateur te le demande.</div>
</div>

<!-- UI haut -->
<div id="ui-top">
  <div class="app-title">Molécules <span>AR</span> · Seconde</div>
  <div id="mol-badges">
    <div class="badge">
      <span class="marker-label">Marqueur HIRO</span>
      H₂O
    </div>
    <div class="badge">
      <span class="marker-label">Marqueur KANJI</span>
      NH₃
    </div>
  </div>
</div>

<!-- Info popup molécule -->
<div id="mol-info">
  <div class="mol-formula" id="info-formula">H₂O</div>
  <div class="mol-name" id="info-name">Eau</div>
  <div class="mol-data" id="info-data"></div>
</div>

<!-- UI bas -->
<div id="ui-bottom">
  <div class="instruction">
    📄 Imprime les marqueurs · 📱 Pointe ta caméra dessus<br>
    <strong>Hiro</strong> → H₂O &nbsp;|&nbsp; <strong>Kanji</strong> → NH₃
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════
     SCÈNE A-FRAME AR
═══════════════════════════════════════════════════════ -->
<a-scene
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
  renderer="antialias: true; alpha: true;"
  vr-mode-ui="enabled: false"
  style="position:fixed;inset:0;width:100%;height:100%;"
>

  <!-- ─────────────────────────────────────────
       MARQUEUR HIRO → Molécule H₂O
  ───────────────────────────────────────── -->
  <a-marker
    preset="hiro"
    id="marker-h2o"
    emitevents="true"
  >
    <!-- Oxygène central (rouge) -->
    <a-sphere
      position="0 0.6 0"
      radius="0.35"
      color="#ff3333"
      material="roughness: 0.3; metalness: 0.1; shader: standard;"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear;"
    ></a-sphere>

    <!-- H gauche — angle 104.5° → position calculée -->
    <!-- vecteur à 52.25° de chaque côté de l'axe vertical -->
    <a-sphere
      position="-0.52 0.28 0"
      radius="0.18"
      color="#eeeeee"
      material="roughness: 0.3; metalness: 0.05; shader: standard;"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear;"
    ></a-sphere>

    <!-- H droit -->
    <a-sphere
      position="0.52 0.28 0"
      radius="0.18"
      color="#eeeeee"
      material="roughness: 0.3; metalness: 0.05; shader: standard;"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear;"
    ></a-sphere>

    <!-- Liaisons O-H gauche -->
    <a-cylinder
      position="-0.26 0.44 0"
      radius="0.045"
      height="0.48"
      color="#aabbcc"
      rotation="0 0 52"
      material="roughness: 0.4;"
    ></a-cylinder>

    <!-- Liaison O-H droite -->
    <a-cylinder
      position="0.26 0.44 0"
      radius="0.045"
      height="0.48"
      color="#aabbcc"
      rotation="0 0 -52"
      material="roughness: 0.4;"
    ></a-cylinder>

    <!-- Label -->
    <a-text
      value="H₂O"
      position="0 1.3 0"
      align="center"
      color="#00d4ff"
      scale="1.2 1.2 1.2"
      font="https://cdn.aframe.io/fonts/Roboto-msdf.json"
    ></a-text>

    <a-text
      value="Angle : 104,5°"
      position="0 1.0 0"
      align="center"
      color="white"
      scale="0.7 0.7 0.7"
    ></a-text>

  </a-marker>

  <!-- ─────────────────────────────────────────
       MARQUEUR KANJI → Molécule NH₃
  ───────────────────────────────────────── -->
  <a-marker
    preset="kanji"
    id="marker-nh3"
    emitevents="true"
  >
    <!-- Azote central (bleu) -->
    <a-sphere
      position="0 0.5 0"
      radius="0.32"
      color="#3366ff"
      material="roughness: 0.3; metalness: 0.1; shader: standard;"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear;"
    ></a-sphere>

    <!-- H1 — devant -->
    <a-sphere
      position="0 0.08 0.55"
      radius="0.18"
      color="#eeeeee"
      material="roughness: 0.3; metalness: 0.05;"
    ></a-sphere>

    <!-- H2 — arrière gauche -->
    <a-sphere
      position="-0.48 0.08 -0.27"
      radius="0.18"
      color="#eeeeee"
      material="roughness: 0.3; metalness: 0.05;"
    ></a-sphere>

    <!-- H3 — arrière droit -->
    <a-sphere
      position="0.48 0.08 -0.27"
      radius="0.18"
      color="#eeeeee"
      material="roughness: 0.3; metalness: 0.05;"
    ></a-sphere>

    <!-- Liaison N-H1 -->
    <a-cylinder position="0 0.29 0.275" radius="0.04" height="0.52"
      color="#aabbcc" rotation="72 0 0" material="roughness:0.4;"></a-cylinder>

    <!-- Liaison N-H2 -->
    <a-cylinder position="-0.24 0.29 -0.135" radius="0.04" height="0.52"
      color="#aabbcc" rotation="72 120 0" material="roughness:0.4;"></a-cylinder>

    <!-- Liaison N-H3 -->
    <a-cylinder position="0.24 0.29 -0.135" radius="0.04" height="0.52"
      color="#aabbcc" rotation="72 240 0" material="roughness:0.4;"></a-cylinder>

    <!-- Label -->
    <a-text
      value="NH₃"
      position="0 1.2 0"
      align="center"
      color="#00d4ff"
      scale="1.2 1.2 1.2"
      font="https://cdn.aframe.io/fonts/Roboto-msdf.json"
    ></a-text>

    <a-text
      value="Angle : 107° — Pyramidale"
      position="0 0.9 0"
      align="center"
      color="white"
      scale="0.6 0.6 0.6"
    ></a-text>

  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<!-- ═══════════════════════════════════════════════════════
     JAVASCRIPT : loader + popups info
═══════════════════════════════════════════════════════ -->
<script>
const INFO = {
  h2o: {
    formula: 'H₂O',
    name: 'Eau',
    data: '⬤ Atome central : Oxygène (O)\n⬤ 2 liaisons O–H\n⬤ Angle H–O–H : 104,5°\n⬤ Géométrie : coudée\n⬤ Molécule polaire'
  },
  nh3: {
    formula: 'NH₃',
    name: 'Ammoniac',
    data: '⬤ Atome central : Azote (N)\n⬤ 3 liaisons N–H\n⬤ Angle H–N–H : 107°\n⬤ Géométrie : pyramidale\n⬤ Molécule polaire'
  }
};

let infoTimeout = null;

function showInfo(key) {
  const d = INFO[key];
  document.getElementById('info-formula').textContent = d.formula;
  document.getElementById('info-name').textContent = d.name;
  document.getElementById('info-data').textContent = d.data;
  const box = document.getElementById('mol-info');
  box.style.display = 'block';
  if (infoTimeout) clearTimeout(infoTimeout);
}

function hideInfo() {
  if (infoTimeout) clearTimeout(infoTimeout);
  infoTimeout = setTimeout(() => {
    document.getElementById('mol-info').style.display = 'none';
  }, 1500);
}

// Attendre que A-Frame soit prêt
window.addEventListener('DOMContentLoaded', () => {
  const scene = document.querySelector('a-scene');

  scene.addEventListener('loaded', () => {
    setTimeout(() => {
      document.getElementById('loader').classList.add('hidden');
    }, 800);
  });

  // Événements marqueurs
  document.getElementById('marker-h2o').addEventListener('markerFound', () => showInfo('h2o'));
  document.getElementById('marker-h2o').addEventListener('markerLost',  hideInfo);
  document.getElementById('marker-nh3').addEventListener('markerFound', () => showInfo('nh3'));
  document.getElementById('marker-nh3').addEventListener('markerLost',  hideInfo);
});
</script>
</body>
</html>
