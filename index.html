<script>
// Crée un mesh cylindre entre deux points A et B
function makeBond(scene, ax, ay, az, bx, by, bz, radius, color, order) {
  var A = new THREE.Vector3(ax, ay, az);
  var B = new THREE.Vector3(bx, by, bz);
  var dir = new THREE.Vector3().subVectors(B, A).normalize();
  var len = A.distanceTo(B);
  var mid = new THREE.Vector3().addVectors(A, B).multiplyScalar(0.5);
  var yAxis = new THREE.Vector3(0, 1, 0);

  // Perpendiculaire robuste
  var ref = (Math.abs(dir.dot(yAxis)) > 0.9)
    ? new THREE.Vector3(1, 0, 0)
    : new THREE.Vector3(0, 1, 0);
  var perp = new THREE.Vector3().crossVectors(dir, ref).normalize();

  var offsets = order === 1 ? [0] : (order === 2 ? [-0.055, 0.055] : [-0.075, 0, 0.075]);
  var r = order === 1 ? radius : radius * 0.7;

  offsets.forEach(function(off) {
    var geo  = new THREE.CylinderGeometry(r, r, len, 16);
    var mat  = new THREE.MeshStandardMaterial({color: color, roughness: 0.3, metalness: 0.1});
    var mesh = new THREE.Mesh(geo, mat);
    var pos  = mid.clone().addScaledVector(perp, off);
    mesh.position.copy(pos);
    mesh.quaternion.setFromUnitVectors(yAxis, dir);
    scene.object3D.add(mesh);
  });
}

var markerEl = null;

function buildMolecule(key) {
  if (!markerEl) return;
  var mol = MOLECULES[key];
  if (!mol) return;

  // Vider le marqueur de tous ses enfants
  while (markerEl.firstChild) markerEl.removeChild(markerEl.firstChild);
  // Vider aussi les meshes Three.js directs
  var obj = markerEl.object3D;
  while (obj.children.length > 0) obj.remove(obj.children[0]);

  // Liaisons via Three.js direct (AVANT les sphères)
  mol.bonds.forEach(function(b) {
    makeBond(markerEl, b[0],b[1],b[2], b[3],b[4],b[5], 0.04, '#bbccdd', b[6]);
  });

  // Atomes via a-sphere (PAR DESSUS les liaisons)
  mol.atoms.forEach(function(a) {
    var el = document.createElement('a-sphere');
    el.setAttribute('position', a[0]+' '+a[1]+' '+a[2]);
    el.setAttribute('radius', a[3]);
    el.setAttribute('material', 'color:'+a[4]+'; roughness:0.15; metalness:0.05; shader:standard;');
    markerEl.appendChild(el);
  });

  // Labels
  var lbl = document.createElement('a-text');
  lbl.setAttribute('value', mol.name);
  lbl.setAttribute('position', '0 1.3 0');
  lbl.setAttribute('align', 'center');
  lbl.setAttribute('color', '#00d4ff');
  lbl.setAttribute('scale', '0.7 0.7 0.7');
  markerEl.appendChild(lbl);

  var inf = document.createElement('a-text');
  inf.setAttribute('value', mol.info);
  inf.setAttribute('position', '0 1.08 0');
  inf.setAttribute('align', 'center');
  inf.setAttribute('color', '#ffffff');
  inf.setAttribute('scale', '0.38 0.38 0.38');
  markerEl.appendChild(inf);

  // UI
  document.getElementById('mol-title').textContent = mol.name;
  document.getElementById('mol-info').textContent  = mol.info;

  document.querySelectorAll('.mol-btn').forEach(function(btn) {
    btn.style.background   = btn.dataset.mol === key ? 'rgba(0,212,255,0.3)' : 'rgba(0,0,0,0.5)';
    btn.style.borderColor  = btn.dataset.mol === key ? '#00d4ff' : 'rgba(255,255,255,0.2)';
  });
}

window.addEventListener('DOMContentLoaded', function() {
  var scene = document.querySelector('a-scene');
  scene.addEventListener('loaded', function() {
    markerEl = document.getElementById('main-marker');
    buildMolecule('h2o');
  });

  document.querySelectorAll('.mol-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      buildMolecule(this.dataset.mol);
    });
  });
});
</script>

  padding:5px 9px; cursor:pointer;
  transition:all 0.15s;

}
</style>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;"
  renderer="colorManagement:true; physicallyCorrectLights:true;"
  vr-mode-ui="enabled:false"
  device-orientation-permission-ui="enabled:false">

  <a-light type="ambient"     color="#ffffff" intensity="0.5"></a-light>
  <a-light type="directional" color="#ffffff" intensity="1.2" position="1 2 1"></a-light>
